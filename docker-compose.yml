services:
  backend:
    build: ./backend
    container_name: investorhome-backend
    environment:
      - INVESTORHOME_DATABASE_URL=sqlite:////app/data/investorhome.db
      - INVESTORHOME_ENABLE_SCHEDULER=true
      - INVESTORHOME_IS24_ENGINE=camoufox
    volumes:
      - ./data:/app/data
    ports:
      - "8086:8000"
    restart: unless-stopped
    networks:
      - investorhome-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  investorhome-network:
    driver: bridge
