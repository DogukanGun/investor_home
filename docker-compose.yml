services:
  backend:
    build: ./backend
    environment:
      - INVESTORHOME_ENABLE_SCHEDULER=true
      # ImmoScout24 / DataDome. Leave proxy empty to use the host's connection.
      - INVESTORHOME_IS24_ENGINE=camoufox
      # - INVESTORHOME_IS24_PROXY=http://user:pass@host:port
    volumes:
      - ih-data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  ih-data:
