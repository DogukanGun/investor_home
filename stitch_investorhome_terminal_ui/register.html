<body class="bg-background text-on-background antialiased min-h-screen flex flex-col items-center justify-center p-margin">
<!-- Registration Container -->
<main class="w-full max-w-md bg-surface-container rounded-xl border border-outline-variant/30 overflow-hidden relative z-10" style="box-shadow: 0 12px 40px -10px rgba(0,0,0,0.5);">
<!-- Header -->
<div class="px-xl pt-xl pb-md text-center border-b border-outline-variant/20">
<div class="flex justify-center mb-md">
<img alt="InvestorHome Logo" class="w-16 h-16 object-contain rounded-lg bg-surface-container-low p-2" src="https://lh3.googleusercontent.com/aida/AP1WRLu3dgcSDuYhyrVCLES8Y76LtlEMqHHTK-Esv-QVRw4JLN0_0O76cFU-4auqiZd4OzJBIEQt1F04Op084Z6G2mhmvgYvbyr0Ciglh_O2JKCtVwUfQh-0jAY_tkdutl4IRLAhvroKJO-josG25pdP5uMrkQVEuQO2r86SI0UYBHSfh64FP2i39ms-OorlP5VS8cTYIaFH8RAa8otfqCgeGQEntnnXYCegFdcm9Y-GvmG5fTFrC5laF93scSc"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Create Account</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Join InvestorHome Analytics for professional grade data.</p>
</div>
<!-- Form Section -->
<div class="p-xl">
<form action="#" class="space-y-lg" method="POST">
<!-- Full Name -->
<div>
<label class="block font-data-sm text-data-sm text-on-surface-variant mb-xs" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]" style="font-variation-settings: 'FILL' 0;">person</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-lg py-sm pl-xl pr-sm text-on-surface font-data-md text-data-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-data-sm text-data-sm text-on-surface-variant mb-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-lg py-sm pl-xl pr-sm text-on-surface font-data-md text-data-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="email" name="email" placeholder="jane.doe@example.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block font-data-sm text-data-sm text-on-surface-variant mb-xs" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-lg py-sm pl-xl pr-xl text-on-surface font-data-md text-data-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-data-sm text-data-sm text-on-surface-variant mb-xs" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]" style="font-variation-settings: 'FILL' 0;">lock_reset</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-lg py-sm pl-xl pr-xl text-on-surface font-data-md text-data-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start mt-sm">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded bg-surface-container-lowest border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-sm text-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                            I agree to the <a class="text-primary hover:text-primary-container transition-colors underline decoration-primary/30 underline-offset-2" href="#">Terms and Conditions</a>
</label>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full bg-primary text-on-primary-fixed font-data-lg text-data-lg font-bold py-md px-lg rounded-lg hover:bg-primary-container hover:shadow-[0_0_15px_rgba(173,198,255,0.3)] transition-all duration-200 flex justify-center items-center gap-sm" type="submit">
                        Sign Up
                        <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Footer / Login Link -->
<div class="px-xl pb-xl pt-sm text-center border-t border-outline-variant/20 mt-sm bg-surface-container-low/50">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary hover:text-primary-container font-data-sm text-data-sm ml-xs transition-colors underline decoration-primary/30 underline-offset-2" href="#">Log in</a>
</p>
</div>
</main>
<!-- Background Atmospheric Elements (Subtle) -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden flex justify-center items-center opacity-30">
<div class="w-[800px] h-[800px] bg-primary rounded-full blur-[150px] opacity-5 -translate-y-1/4"></div>
<div class="w-[600px] h-[600px] bg-secondary rounded-full blur-[120px] opacity-[0.02] translate-y-1/3 translate-x-1/3"></div>
</div>
